name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format
        run: npm run format:check

  test:
    runs-on: ubuntu-latest

    env:
        DATABASE_URL: postgresql://postgres:postgres@localhost/blog_test
        DATABASE_URL_TEST: postgresql://postgres:postgres@localhost/blog_test
        NODE_ENV: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blog_test
        ports:
            - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Migrate database
        run: npx prisma migrate deploy
      - name: Run tests
        run: npm run test:coverage

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run db:generate && npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: [build]

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost/blog_e2e
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost/blog_e2e
      NODE_ENV: development
      JWT_SECRET: ci-e2e-test-secret-at-least-32-chars-long
      E2E_BASE_URL: http://localhost:3000

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blog_e2e
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Migrate database
        run: npx prisma migrate deploy
      - name: Build
        run: npm run build
      - name: Start server
        run: node dist/server.js &
      - name: Wait for server
        run: npx wait-on http://localhost:3000/health --timeout 15000
      - name: Run E2E tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
